name: MDPreview
options:
  bundleIdPrefix: com.mdpreview
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  MDPreview:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdpreview.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MDPreview.entitlements
        PRODUCT_NAME: MDPreview
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: MDPreview.entitlements
    preBuildScripts:
      - name: Copy VERSION
        script: |
          echo "Copying VERSION file..."
          echo "PROJECT_DIR: ${PROJECT_DIR}"
          echo "BUILT_PRODUCTS_DIR: ${BUILT_PRODUCTS_DIR}"
          cp "${PROJECT_DIR}/VERSION" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/VERSION"
          echo "VERSION file copied successfully"
          ls -la "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/VERSION"
