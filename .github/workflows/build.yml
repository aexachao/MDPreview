name: Build DMG

on:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Verify XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project MDPreview.xcodeproj \
            -scheme MDPreview \
            -configuration Release \
            -derivedDataPath DerivedData \
            build

      - name: Create DMG
        id: create_dmg
        run: |
          # Find built app
          APP_PATH=$(find DerivedData/Build/Products/Release -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          # Create DMG with Applications symlink
          TEMP_DIR="/tmp/mdpreview_dmg"
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"
          cp -R "$APP_PATH" "$TEMP_DIR/"
          ln -sf /Applications "$TEMP_DIR/Applications"

          hdiutil create -size 100m \
            -fs HFS+ \
            -volname "MDPreview" \
            -srcfolder "$TEMP_DIR" \
            -format UDZO \
            "MDPreview.dmg"

          ls -la MDPreview.dmg

      - name: Extract changelog for release notes
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Extract changelog section for this version
          VERSION=$(cat VERSION)
          # Get content between version header and next version header (or end)
          # Use sed to remove first line (version header) and last line (next version header)
          CHANGELOG=$(awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | sed '1d;$d')
          # Remove ### prefix but keep content, convert newlines to spaces
          NOTES=$(echo "$CHANGELOG" | sed 's/^### /**/;s/^- /**/;s/$/**/' | tr '\n' ' ' | sed 's/\*\*  \*\*/\n\n/g')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload DMG to Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          NOTES="${{ steps.changelog.outputs.notes }}"
          # Create release with changelog notes, then upload DMG
          gh release create "$TAG_NAME" --title "MDPreview $TAG_NAME" --notes "$NOTES" MDPreview.dmg || gh release upload "$TAG_NAME" MDPreview.dmg --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDPreview-dmg-${{ steps.version.outputs.version }}
          path: MDPreview.dmg
